<div class="list-container">
  <header class="list-header">
    <h1>🤖 Robot Types</h1>
    <button
      class="btn btn-primary"
      routerLink="/robot-types/create"
      aria-label="Create a new robot type"
    >
      + Create Robot Type
    </button>
  </header>

  <!-- Success Alert -->
  <div *ngIf="success" class="alert alert-success" role="status" aria-live="polite">
    ✓ {{ success }}
  </div>

  <!-- Error Alert -->
  <div *ngIf="error" class="alert alert-error" role="alert" aria-live="assertive">
    ✕ {{ error }}
    <button class="alert-close-btn" (click)="error = null" aria-label="Close error message">
      ×
    </button>
  </div>

  <div *ngIf="loading" class="loading" role="status" aria-live="polite">
    <p>Loading robot types...</p>
  </div>

  <div *ngIf="!loading && !error" class="robot-types-section">
    <div *ngIf="robotTypes.length === 0" class="no-items">
      <p>No robot types available</p>
      <p class="no-items-hint">Create your first robot type to get started</p>
    </div>

    <div *ngIf="robotTypes.length > 0" class="robot-types-grid">
      <article
        *ngFor="let robot of robotTypes"
        class="robot-type-card"
        [attr.aria-label]="'Robot type: ' + robot.name"
        [class.deleting]="isDeleting(robot.id)"
      >
        <div class="card-header">
          <h2>{{ robot.name }}</h2>
          <span class="type-id" title="Robot Type ID">ID: {{ robot.id }}</span>
        </div>

        <div class="card-content">
          <div class="property">
            <span class="label">Dimensions:</span>
            <span class="value">{{ robot.dimensions }}</span>
          </div>
          <div class="property">
            <span class="label">Sketch:</span>
            <span class="value">
              {{ robot.sketch && robot.sketch.length > 0 ? 'Yes' : 'None' }}
            </span>
          </div>
        </div>

        <div class="card-actions" [attr.aria-busy]="isDeleting(robot.id)">
          <button
            class="btn btn-sm btn-secondary"
            [routerLink]="['/robot-types', robot.id, 'edit']"
            [disabled]="isDeleting(robot.id)"
            [attr.aria-label]="'Edit ' + robot.name"
            title="Edit robot type"
          >
            ✎ Edit
          </button>
          <button
            class="btn btn-sm btn-secondary"
            (click)="onViewSketch(robot.id)"
            [disabled]="!robot.sketch || robot.sketch.length === 0 || isDeleting(robot.id)"
            [attr.aria-label]="'View sketch for ' + robot.name"
            title="View robot type sketch"
          >
            👁 View Sketch
          </button>
          <button
            class="btn btn-sm btn-danger"
            (click)="onDelete(robot.id)"
            [disabled]="isDeleting(robot.id)"
            [attr.aria-label]="'Delete ' + robot.name"
            [attr.aria-busy]="isDeleting(robot.id)"
          >
            {{ isDeleting(robot.id) ? '⏳ Deleting...' : '🗑 Delete' }}
          </button>
        </div>
      </article>
    </div>
  </div>
</div>
