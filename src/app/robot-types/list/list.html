<div class="container">
  <h1>🤖 Robot Types</h1>

  <div *ngIf="loading" class="loading">
    <p>Loading robot types...</p>
  </div>

  <div *ngIf="error && !loading" class="error">
    <p>{{ error }}</p>
    <button (click)="loadRobotTypes()">Retry</button>
  </div>

  <div *ngIf="!loading && !error" class="robot-types-list">
    <div *ngIf="robotTypes.length === 0" class="no-items">
      <p>No robot types available</p>
    </div>
    <div *ngFor="let robot of robotTypes" class="robot-type-item">
      <h3>{{ robot.name }}</h3>
      <p><strong>ID:</strong> {{ robot.id }}</p>
      <p><strong>Dimensions:</strong> {{ robot.dimensions }}</p>
    </div>
  </div>

  <div class="add-robot-form">
    <h2>Add New Robot Type</h2>
    
    <!-- Success message -->
    <div *ngIf="successMessage" class="success">
      <p>{{ successMessage }}</p>
    </div>

    <form (ngSubmit)="addRobotType()">
      <div class="form-group">
        <label for="name">Name:</label>
        <input 
          type="text" 
          id="name" 
          [(ngModel)]="robotType.name" 
          name="name" 
          required 
          [disabled]="isSubmitting"
        />
      </div>
      <div class="form-group">
        <label for="dimensions">Dimensions:</label>
        <input
          type="text"
          id="dimensions"
          [(ngModel)]="robotType.dimensions"
          name="dimensions"
          required
          [disabled]="isSubmitting"
        />
      </div>
      <button 
        type="submit" 
        [disabled]="isSubmitting || !robotType.name || !robotType.dimensions"
      >
        {{ isSubmitting ? 'Adding...' : 'Add Robot Type' }}
      </button>
    </form>
  </div>
</div>
